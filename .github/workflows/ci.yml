name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install (with web extra for the FastAPI tests)
        run: uv sync --extra web

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type-check (mypy --strict)
        run: uv run mypy

      - name: Architecture contract (import-linter)
        run: uv run lint-imports

      - name: Tests (no GPU — FakeProvider)
        run: uv run pytest -q
