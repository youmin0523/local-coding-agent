<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lca — local coding agent</title>
    <style>
      :root {
        --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #e6edf3;
        --muted: #8b949e; --accent: #2f81f7; --green: #3fb950; --yellow: #d29922;
        --red: #f85149; --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; height: 100vh;
        display: flex; flex-direction: row; }
      #sidebar { width: 240px; flex-shrink: 0; background: #0b0f14; border-right: 1px solid var(--border);
        display: flex; flex-direction: column; padding: 10px; gap: 8px; overflow-y: auto; }
      #newChat { background: var(--accent); color: #fff; border: none; border-radius: 8px;
        padding: 9px; cursor: pointer; font-size: 14px; font-weight: 600; }
      #convList { display: flex; flex-direction: column; gap: 3px; margin-top: 4px; }
      .conv { display: flex; align-items: center; gap: 6px; padding: 7px 9px; border-radius: 6px;
        cursor: pointer; font-size: 13px; color: var(--text); border: 1px solid transparent; }
      .conv:hover { background: var(--panel); }
      .conv.active { background: var(--panel); border-color: var(--border); }
      .conv .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .conv .del { color: var(--muted); opacity: 0; font-size: 12px; }
      .conv:hover .del { opacity: 1; }
      #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
      header { padding: 12px 18px; border-bottom: 1px solid var(--border);
        display: flex; align-items: center; gap: 12px; }
      header h1 { font-size: 15px; margin: 0; font-weight: 600; }
      header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
      header .spacer { flex: 1; }
      select { background: var(--panel); color: var(--text); border: 1px solid var(--border);
        border-radius: 6px; padding: 5px 8px; font-size: 13px; }
      .hbtn { background: var(--panel); color: var(--text); border: 1px solid var(--border);
        border-radius: 6px; padding: 5px 10px; font-size: 13px; cursor: pointer; margin-right: 8px; }
      .hbtn:hover { border-color: var(--accent); }
      #log { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
      .msg { max-width: 820px; }
      .msg.user { align-self: flex-end; background: var(--accent); color: #fff;
        padding: 9px 13px; border-radius: 12px 12px 2px 12px; white-space: pre-wrap; }
      .msg.assistant { align-self: flex-start; white-space: pre-wrap; line-height: 1.5; }
      .tool { align-self: flex-start; background: var(--panel); border: 1px solid var(--border);
        border-radius: 8px; padding: 8px 12px; font-size: 13px; max-width: 820px; }
      .tool .name { font-family: var(--mono); color: var(--accent); }
      pre { background: #0b0f14; border: 1px solid var(--border); border-radius: 6px;
        padding: 10px; overflow-x: auto; font-family: var(--mono); font-size: 12.5px; margin: 6px 0 0; position: relative; }
      pre .copy { position: absolute; top: 6px; right: 6px; font-size: 11px; padding: 2px 7px;
        background: var(--panel); color: var(--muted); border: 1px solid var(--border);
        border-radius: 5px; cursor: pointer; }
      pre:hover .copy { color: var(--text); }
      .msg.assistant code { font-family: var(--mono); background: #0b0f14;
        padding: 1px 5px; border-radius: 4px; font-size: 12.5px; }
      .msg.assistant pre code { background: none; padding: 0; }
      .msg.assistant ul { margin: 4px 0; padding-left: 20px; }
      .add { color: var(--green); } .del { color: var(--red); }
      .badge { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 10px; }
      .badge.pass { background: rgba(63,185,80,.15); color: var(--green); }
      .badge.fail, .badge.abstain { background: rgba(248,81,73,.12); color: var(--red); }
      .badge.recall { background: rgba(88,166,255,.14); color: var(--blue, #58a6ff); }
      .approval { align-self: flex-start; background: rgba(210,153,34,.1);
        border: 1px solid var(--yellow); border-radius: 8px; padding: 10px 12px; max-width: 820px; }
      .approval button { margin-right: 8px; margin-top: 8px; padding: 5px 14px; border-radius: 6px;
        border: 1px solid var(--border); cursor: pointer; font-size: 13px; }
      .approval .allow { background: var(--green); color: #04260f; border: none; }
      .approval .deny { background: var(--panel); color: var(--text); }
      .muted { color: var(--muted); font-size: 12px; }
      .thinking { color: var(--muted); font-style: italic; }
      .dots::after { content: ""; animation: dots 1.2s steps(1, end) infinite; }
      @keyframes dots { 0% { content: ""; } 25% { content: "."; } 50% { content: ".."; } 75% { content: "..."; } }
      footer { border-top: 1px solid var(--border); padding: 12px 18px; display: flex; gap: 10px; }
      #input { flex: 1; resize: none; background: var(--panel); color: var(--text);
        border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: 14px;
        font-family: inherit; }
      #send { background: var(--accent); color: #fff; border: none; border-radius: 8px;
        padding: 0 20px; font-size: 14px; cursor: pointer; }
      #send:disabled { opacity: .5; cursor: default; }
      #stop { display: none; background: var(--red); color: #fff; border: none;
        border-radius: 8px; padding: 0 20px; font-size: 14px; cursor: pointer; }
    </style>
  </head>
  <body>
    <aside id="sidebar">
      <button id="newChat">+ 새 채팅</button>
      <div id="convList"></div>
    </aside>
    <div id="main">
      <header>
        <span class="dot"></span>
        <h1>lca — local coding agent</h1>
        <span class="muted">100% local</span>
        <span class="spacer"></span>
        <span id="ctx" class="muted" title="대화가 차지하는 컨텍스트"></span>
        <button id="copyMd" class="hbtn" title="대화를 마크다운으로 클립보드에 복사">MD 복사</button>
        <button id="saveMd" class="hbtn" title="대화를 .md 파일로 저장">MD 저장</button>
        <label class="muted">model
          <select id="model">
            <option value="auto">auto</option>
            <option value="fast">fast · 7B</option>
            <option value="brain">quality · 30B</option>
          </select>
        </label>
        <label class="muted">mode
          <select id="mode">
            <option value="gated">gated</option>
            <option value="autonomous">autonomous</option>
            <option value="plan">plan</option>
          </select>
        </label>
      </header>
      <div id="log"></div>
      <footer>
        <textarea id="input" rows="2" placeholder="Ask the agent… (Enter to send)"></textarea>
        <button id="send">Send</button>
        <button id="stop">■ 중단</button>
      </footer>
    </div>

    <script>
      const log = document.getElementById("log");
      const input = document.getElementById("input");
      const send = document.getElementById("send");
      const modeSel = document.getElementById("mode");
      const modelSel = document.getElementById("model");
      const copyMd = document.getElementById("copyMd");
      const saveMd = document.getElementById("saveMd");
      const ctxEl = document.getElementById("ctx");
      const convList = document.getElementById("convList");
      const newChat = document.getElementById("newChat");
      const stop = document.getElementById("stop");
      let currentRunId = null;
      function setRunning(on) {
        send.style.display = on ? "none" : "inline-block";
        stop.style.display = on ? "inline-block" : "none";  // explicit: #stop CSS default is none
        send.disabled = on;
        if (!on) currentRunId = null;
      }
      stop.onclick = () => {
        if (currentRunId) fetch(`/api/runs/${currentRunId}/stop`, { method: "POST" });
      };
      let transcript = [];          // {role, text} for the current conversation
      let currentConv = null;
      let ctxBudget = 16384;

      function el(cls, html) {
        const d = document.createElement("div");
        d.className = cls; if (html !== undefined) d.innerHTML = html;
        log.appendChild(d); log.scrollTop = log.scrollHeight; return d;
      }
      function esc(s) { return (s || "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
      function diffHtml(body) {
        return esc(body).split("\n").map(l =>
          l.startsWith("+") ? `<span class="add">${l}</span>` :
          l.startsWith("-") ? `<span class="del">${l}</span>` : l).join("\n");
      }
      // Minimal, XSS-safe markdown (escape first, then a safe subset; code blocks get a copy button).
      function md(t) {
        const blocks = [];
        let s = t.replace(/```([\s\S]*?)```/g, (_m, c) => {
          blocks.push(c.replace(/^\n/, "")); return `@@CB${blocks.length - 1}@@`;
        });
        s = esc(s);
        s = s.replace(/`([^`\n]+)`/g, (_m, c) => `<code>${c}</code>`);
        s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        s = s.replace(/^#{1,6}\s+(.+)$/gm, "<strong>$1</strong>");
        s = s.replace(/^(?:- |\* )(.+)$/gm, "<li>$1</li>");
        s = s.replace(/(<li>(?:.|<br>)*?<\/li>)(?!\s*<li>)/g, "<ul>$1</ul>");
        s = s.replace(/\n/g, "<br>");
        s = s.replace(/@@CB(\d+)@@/g, (_m, i) =>
          `<pre><span class="copy">copy</span><code>${esc(blocks[i])}</code></pre>`);
        return s;
      }
      // Delegate clicks on code-block "copy" buttons.
      log.addEventListener("click", (e) => {
        if (e.target.classList && e.target.classList.contains("copy")) {
          const code = e.target.parentNode.querySelector("code");
          if (code) { navigator.clipboard.writeText(code.textContent).catch(() => {}); e.target.textContent = "copied ✓"; }
        }
      });

      function notifyDone(text) {
        // Desktop (Windows) notification when the answer is ready and the tab is in the background.
        if (!("Notification" in window) || Notification.permission !== "granted" || !document.hidden) return;
        try { new Notification("lca — 응답 완료", { body: (text || "").slice(0, 140) || "처리가 완료되었습니다." }); }
        catch (e) { /* notifications unavailable */ }
      }
      function updateCtx() {
        const chars = transcript.reduce((n, m) => n + m.text.length, 0);
        const used = Math.round(chars / 3) + 1200;  // mirrors the server's estimate
        const pct = Math.min(100, Math.round((used / ctxBudget) * 100));
        ctxEl.textContent = `🧠 ${pct}% · ${(used / 1000).toFixed(1)}K/${Math.round(ctxBudget / 1000)}K`;
      }

      // ---- Conversations -----------------------------------------------------
      async function loadConversations(select) {
        const { conversations } = await (await fetch("/api/conversations")).json();
        renderConvList(conversations);
        const target = select || (conversations[0] && conversations[0].id);
        if (target) await selectConv(target);
      }
      async function refreshList() {  // update the sidebar only — never reload the live log
        const { conversations } = await (await fetch("/api/conversations")).json();
        renderConvList(conversations);
      }
      function renderConvList(list) {
        convList.innerHTML = "";
        list.forEach((c) => {
          const row = document.createElement("div");
          row.className = "conv" + (c.id === currentConv ? " active" : "");
          row.innerHTML = `<span class="title">${esc(c.title)}</span><span class="del" title="삭제">✕</span>`;
          row.querySelector(".title").onclick = () => selectConv(c.id);
          row.querySelector(".del").onclick = (e) => { e.stopPropagation(); deleteConv(c.id); };
          convList.appendChild(row);
        });
      }
      async function selectConv(id) {
        currentConv = id;
        const { messages } = await (await fetch(`/api/conversations/${id}`)).json();
        log.innerHTML = ""; transcript = [];
        messages.forEach((m) => {
          transcript.push({ role: m.role, text: m.content });
          if (m.role === "user") el("msg user", esc(m.content));
          else el("msg assistant", md(m.content));
        });
        updateCtx();
        const { conversations } = await (await fetch("/api/conversations")).json();
        renderConvList(conversations);
      }
      async function deleteConv(id) {
        await fetch(`/api/conversations/${id}`, { method: "DELETE" });
        if (id === currentConv) currentConv = null;
        await loadConversations();
      }
      newChat.onclick = async () => {
        const { id } = await (await fetch("/api/conversations", {
          method: "POST", headers: { "Content-Type": "application/json" }, body: "{}",
        })).json();
        await loadConversations(id);
        input.focus();
      };

      async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;
        if ("Notification" in window && Notification.permission === "default") {
          Notification.requestPermission();  // ask once, on a user gesture
        }
        input.value = ""; setRunning(true);
        el("msg user", esc(text));
        transcript.push({ role: "user", text });
        updateCtx();
        let assistant = null;
        let turnText = "";

        let thinking = null;
        const showThinking = (label) => {
          if (!thinking) thinking = el("msg assistant thinking");
          thinking.innerHTML = `${esc(label)}<span class="dots"></span>`;
          log.scrollTop = log.scrollHeight;
        };
        const hideThinking = () => { if (thinking) { thinking.remove(); thinking = null; } };
        showThinking("답변 작성 중");

        const res = await fetch("/api/runs", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, mode: modeSel.value, model: modelSel.value, conversation_id: currentConv || "" }),
        });
        const data = await res.json();
        const run_id = data.run_id;
        currentRunId = run_id;
        if (data.conversation_id) currentConv = data.conversation_id;
        if (data.token_budget) { ctxBudget = parseInt(data.token_budget, 10) || ctxBudget; }
        const ev = new EventSource(`/api/runs/${run_id}/events`);

        ev.onmessage = (e) => {
          const m = JSON.parse(e.data);
          if (m.type === "token") {
            hideThinking();
            turnText += m.text;
            if (!assistant) { assistant = el("msg assistant", ""); assistant._raw = ""; }
            assistant._raw += m.text;
            assistant.innerHTML = md(assistant._raw);
            log.scrollTop = log.scrollHeight;
          } else if (m.type === "tool_started") {
            hideThinking();
            el("tool", `<span class="name">→ ${esc(m.name)}</span>`);
          } else if (m.type === "tool_finished") {
            const ok = m.result.ok ? "ok" : "failed";
            const t = el("tool", `<span class="name">${esc(m.name)}</span> · ${ok}`);
            (m.result.artifacts || []).forEach(a => {
              if (a.kind === "diff" && a.body) {
                const p = document.createElement("pre"); p.innerHTML = diffHtml(a.body); t.appendChild(p);
              } else if (a.kind === "citation") {
                const c = document.createElement("div"); c.className = "muted";
                c.textContent = "cite: " + (a.uri || a.title); t.appendChild(c);
              }
            });
            assistant = null;
            showThinking("결과 분석 중");
          } else if (m.type === "approval_required") {
            hideThinking();
            const detail = m.preview
              ? `<pre>${diffHtml(m.preview)}</pre>`
              : `<div class="muted">${esc(JSON.stringify(m.call.arguments))}</div>`;
            const box = el("approval",
              `<b>Approval required</b> — <span style="font-family:var(--mono)">${esc(m.call.name)}</span>
               (${m.risk})${detail}`);
            const allow = document.createElement("button"); allow.className = "allow"; allow.textContent = "Allow";
            const deny = document.createElement("button"); deny.className = "deny"; deny.textContent = "Deny";
            const decide = (approved) => {
              allow.disabled = deny.disabled = true;
              fetch(`/api/approvals/${m.request_id}`, { method: "POST",
                headers: { "Content-Type": "application/json" }, body: JSON.stringify({ approved }) });
              box.querySelector(".muted").textContent += approved ? " — allowed" : " — denied";
            };
            allow.onclick = () => decide(true); deny.onclick = () => decide(false);
            box.appendChild(allow); box.appendChild(deny);
          } else if (m.type === "context_recalled") {
            el("msg assistant", `<span class="badge recall">↺ recalled</span> <span class="muted">${esc(m.detail)}</span>`);
          } else if (m.type === "verification") {
            hideThinking();
            el("msg assistant", `<span class="badge ${m.verdict}">verified: ${m.verdict} (${m.confidence.toFixed(2)})</span> <span class="muted">${esc(m.detail)}</span>`);
          } else if (m.type === "abstain") {
            hideThinking(); assistant = null;
            el("msg assistant", `<span class="badge abstain">not confident</span> ${esc(m.reason)}` +
              (m.options || []).map(o => `<div class="muted">· ${esc(o)}</div>`).join(""));
          } else if (m.type === "error") {
            hideThinking();
            el("msg assistant", `<span class="badge fail">error</span> ${esc(m.message)}`);
          } else if (m.type === "turn_finished") {
            hideThinking();
            if (turnText.trim()) transcript.push({ role: "assistant", text: turnText });
            updateCtx();
            notifyDone(turnText);
            ev.close(); setRunning(false); input.focus();
            refreshList();  // update sidebar titles without reloading the live log
          }
        };
        ev.onerror = () => { hideThinking(); ev.close(); setRunning(false); };
      }

      send.onclick = sendMessage;
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });

      // ---- Markdown export ---------------------------------------------------
      function toMarkdown() {
        if (!transcript.length) return "";
        const body = transcript
          .map((m) => (m.role === "user" ? `## 🧑 You\n\n${m.text}` : `## 🤖 lca\n\n${m.text}`))
          .join("\n\n");
        return `# lca 대화\n\n${body}\n`;
      }
      function flash(btn, label) {
        const old = btn.textContent; btn.textContent = label;
        setTimeout(() => { btn.textContent = old; }, 1500);
      }
      function downloadMd(text) {
        const blob = new Blob([text], { type: "text/markdown;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob); a.download = "lca-chat.md"; a.click();
        URL.revokeObjectURL(a.href);
      }
      copyMd.onclick = async () => {
        const text = toMarkdown();
        if (!text) { flash(copyMd, "대화 없음"); return; }
        try { await navigator.clipboard.writeText(text); flash(copyMd, "복사됨 ✓"); }
        catch { downloadMd(text); flash(copyMd, "파일로 저장됨"); }  // clipboard blocked → fall back
      };
      saveMd.onclick = () => {
        const text = toMarkdown();
        if (!text) { flash(saveMd, "대화 없음"); return; }
        downloadMd(text); flash(saveMd, "저장됨 ✓");
      };

      loadConversations();
    </script>
  </body>
</html>
